name: Deploy cPanel frontend

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and upload frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Add cPanel route fallback
        run: |
          cat > frontend/dist/.htaccess <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload to cPanel via FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          for attempt in 1 2 3; do
            if lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "${FTP_PORT:-21}" "$FTP_SERVER" <<EOF
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ftp:passive-mode true
          set ftp:sync-mode true
          set cmd:parallel 1
          set net:timeout 30
          set net:max-retries 1
          set net:reconnect-interval-base 20
          set net:reconnect-interval-multiplier 2
          set ssl:verify-certificate no
          mirror --reverse --delete --verbose --parallel=1 frontend/dist/ "$FTP_SERVER_DIR"
          bye
          EOF
            then
              exit 0
            fi

            echo "FTP server rejected the upload, waiting before retry $attempt/3..."
            sleep 90
          done

          exit 1
